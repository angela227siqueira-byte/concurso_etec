<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>📘 Imaginação Sociológica · Charles Wright Mills</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Verdana', 'Arial', sans-serif;
            background: #f5f7f6;
            color: #1a2e2a;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            margin: 0;
        }

        .reader-wrapper {
            width: 100%;
            max-width: 85%;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.04);
            padding: 20px 30px;
            border: 1px solid #dde5e0;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        .fixed-header {
            margin-bottom: 12px;
            border-bottom: 2px solid #dde5e0;
            padding-bottom: 8px;
        }
        .fixed-header h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #0f3d2e;
            line-height: 1.2;
            margin-bottom: 6px;
        }
        .progress-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.9rem;
            font-weight: 600;
            color: #1a5e44;
            margin-bottom: 6px;
        }
        .progress-bar-bg {
            background: #dee6e1;
            height: 7px;
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            background: #1a7a58;
            height: 7px;
            width: 0%;
            border-radius: 20px;
            transition: width 0.2s;
        }

        .text-content {
            text-align: justify;
            padding: 8px 0 16px;
            max-height: 58vh;
            overflow-y: auto;
            font-size: 18px;
            line-height: 1.5;
            margin: 0 2px;
            scroll-behavior: smooth;
        }
        .text-content p {
            margin-bottom: 1em;
        }
        .text-content h2, .text-content h3, .text-content h4 {
            margin: 1.2em 0 0.3em;
            color: #154e3a;
            font-weight: 600;
        }

        .img-text-row {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .img-container {
            flex: 0 0 auto;
            max-width: 35vw;
            text-align: center;
        }
        .img-container img {
            height: 50vh;
            max-height: 400px;
            width: auto;
            max-width: 100%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .img-container iframe {
            width: 100%;
            height: 50vh;
            max-height: 400px;
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .text-container {
            flex: 1;
            min-width: 200px;
        }
        .right-image .text-container { order: 1; }
        .right-image .img-container { order: 2; }
        .left-image .text-container { order: 2; }
        .left-image .img-container { order: 1; }

        .toolbar-single {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            margin: 18px 0 14px;
            padding: 4px 0 8px;
            border-top: 1px solid #dde5e0;
            border-bottom: 1px solid #dde5e0;
        }
        .tool-btn {
            background: #ecf3ef;
            border: 1px solid #b3cdbf;
            color: #134531;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 10px 14px;
            border-radius: 48px;
            min-width: 60px;
            text-align: center;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .tool-btn:active { background: #d0e0d7; transform: scale(0.96); }
        .tool-btn:disabled { opacity: 0.4; background: #e0e8e3; border-color: #b6ccc1; pointer-events: none; }
        select.tool-btn { background: #ecf3ef; width: auto; }

        .capa {
            text-align: center;
            padding: 40px 20px;
        }
        .capa h1 { font-size: 36px; margin-bottom: 20px; color: #0f3d2e; }
        .capa h2 { font-size: 28px; margin-bottom: 40px; color: #1a5e44; }
        .capa p { font-size: 22px; color: #2a5e4a; }

        .congrats-page {
            text-align: center;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 50vh;
        }
        .congrats-page h2 { color: #1a5e44; margin-bottom: 10px; font-size: 2rem; }
        .congrats-page p { margin: 20px 0; }

        @media (max-width: 700px) {
            .reader-wrapper { max-width: 98%; padding: 15px; }
            .tool-btn { padding: 8px 10px; min-width: 50px; font-size: 0.9rem; }
            .img-text-row { flex-direction: column; }
            .img-container { max-width: 100%; text-align: center; }
            .img-container img, .img-container iframe { height: auto; max-height: 300px; width: auto; max-width: 90%; }
            .right-image .text-container, .right-image .img-container,
            .left-image .text-container, .left-image .img-container { order: unset; }
            .capa h1 { font-size: 28px; }
            .capa h2 { font-size: 24px; }
            .capa p { font-size: 18px; }
        }
    </style>
</head>
<body>
<div class="reader-wrapper">
    <div id="readerScreen" class="screen active">
        <div class="fixed-header">
            <h1>Imaginação Sociológica · Charles Wright Mills</h1>
            <div class="progress-row">
                <span id="pageXofY">Página 1 de 11</span>
                <span id="progressPercent">9%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>
        <div class="text-content" id="pageContent"></div>
        <div class="toolbar-single">
            <button class="tool-btn" id="fontMinusBtn" title="Diminuir fonte">A−</button>
            <button class="tool-btn" id="fontPlusBtn" title="Aumentar fonte">A+</button>
            <button class="tool-btn" id="fullscreenBtn" title="Tela cheia">⛶</button>
            <button class="tool-btn" id="prevBtnInline" title="Página anterior">◀</button>
            <button class="tool-btn" id="nextBtnInline" title="Próxima página">▶</button>
            <button class="tool-btn" id="speakBtn" title="Ouvir/Parar">🔊</button>
            <select id="rateSelect" class="tool-btn" style="width: auto;">
                <option value="0.75">0.75x</option>
                <option value="1" selected>1x</option>
                <option value="1.25">1.25x</option>
                <option value="1.5">1.5x</option>
                <option value="2">2x</option>
            </select>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- CONTEÚDO DAS PÁGINAS ----------
        const pageContents = [
            // PÁGINA 0 - CAPA
            `<div class="capa">
                <h1>Imaginação Sociológica</h1>
                <h2>Charles Wright Mills (1916–1962)</h2>
                <p>Conectando biografia e história</p>
            </div>`,

            // PÁGINA 1 - ÍNDICE
            `<div class="text-container" style="max-width:100%;">
                <h3>📌 Índice</h3>
                <ol>
                    <li>1. Quem foi Charles Wright Mills?</li>
                    <li>2. Contexto histórico e influências</li>
                    <li>3. O que é imaginação sociológica?</li>
                    <li>4. Problemas pessoais x questões públicas</li>
                    <li>5. Exemplo clássico: desemprego</li>
                    <li>6. Exemplo contemporâneo: Black Lives Matter</li>
                    <li>7. A elite do poder</li>
                    <li>8. Relevância atual da imaginação sociológica</li>
                </ol>
            </div>`,

            // ----- TÓPICO 1: Quem foi Mills? -----
            `<div class="img-text-row right-image">
                <div class="text-container">
                    <h3>1. Quem foi Charles Wright Mills?</h3>
                    <p>Charles Wright Mills (1916–1962) foi um sociólogo norte‑americano, professor da Universidade de Columbia. De origem texana, tornou‑se um dos mais influentes pensadores críticos da sociedade estadunidense do pós‑guerra. Sua obra mais conhecida, <em>A imaginação sociológica</em> (1959), propõe uma forma de pensar que conecta as experiências individuais às estruturas sociais mais amplas. Mills também escreveu <em>A elite do poder</em> (1956), na qual analisa a concentração de poder nos Estados Unidos entre as elites militar, política e econômica. Sua abordagem combativa e seu estilo acessível fizeram dele uma voz singular na sociologia, inspirando gerações de estudantes e ativistas.</p>
                </div>
                <div class="img-container">
                    <img src="https://3.bp.blogspot.com/-U1xQ95bzvBg/UDzqY-feCSI/AAAAAAAABj0/jMKmKivCoFk/s1600/mills.jpg" alt="Charles Wright Mills" aria-hidden="true">
                </div>
            </div>`,

            // ----- TÓPICO 2: Contexto histórico -----
            `<div class="img-text-row left-image">
                <div class="img-container">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/Charles_Wright_Mills.jpg/800px-Charles_Wright_Mills.jpg" alt="Mills em sua mesa de trabalho" aria-hidden="true">
                </div>
                <div class="text-container">
                    <h3>2. Contexto histórico e influências</h3>
                    <p>Mills produziu sua obra nos anos 1950, período de prosperidade econômica nos EUA, mas também de conformismo político e Guerra Fria. Influenciado por Karl Marx, Max Weber e pelos pragmatistas americanos, Mills criticava tanto o "grande teoria" abstrata de Talcott Parsons quanto o empirismo abstrato dos pesquisadores quantitativos. Ele acreditava que a sociologia deveria ser uma "arte pública", engajada com os problemas reais das pessoas comuns. Para Mills, o sociólogo não podia se isolar na torre de marfim acadêmica; devia traduzir as grandes questões históricas em termos acessíveis e devolvê‑las ao debate público.</p>
                </div>
            </div>`,

            // ----- TÓPICO 3: Imaginação sociológica -----
            `<div class="img-text-row right-image">
                <div class="text-container">
                    <h3>3. O que é imaginação sociológica?</h3>
                    <p>A imaginação sociológica é a capacidade de perceber que as experiências individuais e os acontecimentos históricos estão intimamente conectados. Nas palavras de Mills, ela permite "compreender o cenário histórico mais amplo em termos de seu significado para a vida íntima e para a trajetória exterior de uma diversidade de indivíduos". Trata‑se de uma qualidade de espírito que possibilita ao indivíduo situar‑se dentro de sua época, entendendo como sua vida pessoal é moldada por forças sociais. Sem essa ferramenta, as pessoas tendem a interpretar suas dificuldades como fracassos estritamente pessoais, ignorando as dimensões estruturais que as produzem.</p>
                </div>
                <div class="img-container">
                    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiG3JHElNm9At0hTmx2xgsFDF9Wl_A2iA4cMvIT6Vk9KEjI7GWLbOLXkZ0Dcx16pJ0m09Zhk1NQX0_u3yZ-_JFmUzTWw4IQ3T0dWbLGhCvK4l7UFTRFVgyD6XfShUAHjz4vFw/w1200-h630-p-k-no-nu/Imagina%25C3%25A7%25C3%25A3o+Sociol%25C3%25B3gica.jpg" alt="Diagrama da imaginação sociológica" aria-hidden="true">
                </div>
            </div>`,

            // ----- TÓPICO 4: Problemas pessoais x questões públicas -----
            `<div class="img-text-row left-image">
                <div class="img-container">
                    <img src="https://sociologiareflexiva.files.wordpress.com/2018/03/mills.jpg?w=640" alt="Livro A Imaginação Sociológica" aria-hidden="true">
                </div>
                <div class="text-container">
                    <h3>4. Problemas pessoais x questões públicas</h3>
                    <p>A distinção central proposta por Mills é entre <strong>problemas pessoais</strong> (<em>troubles</em>) e <strong>questões públicas</strong> (<em>issues</em>). Um problema pessoal ocorre dentro do caráter do indivíduo e de suas relações imediatas com os outros; sua solução está no âmbito da ação individual. Já uma questão pública transcende o ambiente local do indivíduo, envolvendo a organização estrutural da sociedade. A tarefa da imaginação sociológica é justamente converter problemas pessoais em questões públicas – por exemplo, quando apenas alguns poucos estão desempregados, trata‑se de um problema pessoal; quando milhões estão na mesma situação, é uma questão pública que requer análise estrutural da economia.</p>
                </div>
            </div>`,

            // ----- TÓPICO 5: Exemplo do desemprego -----
            `<div class="img-text-row right-image">
                <div class="text-container">
                    <h3>5. Exemplo clássico: o desemprego</h3>
                    <p>Mills usa o desemprego para ilustrar a distinção entre problema pessoal e questão pública. Em uma cidade de 100 mil habitantes, se apenas um homem está desempregado, sua situação deve ser explicada por suas características pessoais: qualificação, habilidades, oportunidades imediatas. Entretanto, em uma nação de 50 milhões de trabalhadores, com 15 milhões desempregados, o problema extrapola o indivíduo. Nenhuma soma de soluções individuais resolverá a crise – é necessário analisar as estruturas econômicas, as políticas governamentais e as dinâmicas do capitalismo. A imaginação sociológica permite enxergar que o desemprego em massa não é uma coleção de fracassos individuais, mas sim um sintoma de problemas estruturais.</p>
                </div>
                <div class="img-container">
                    <img src="https://static.todamateria.com.br/upload/de/se/desempregobrasil-cke.jpg" alt="Fila de desempregados" aria-hidden="true">
                </div>
            </div>`,

            // ----- TÓPICO 6: Black Lives Matter -----
            `<div class="img-text-row left-image">
                <div class="img-container">
                    <iframe src="https://www.youtube.com/embed/YTkkubL5v6k?controls=0" frameborder="0" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true" title="" aria-hidden="true" tabindex="-1"></iframe>
                </div>
                <div class="text-container">
                    <h3>6. Exemplo contemporâneo: Black Lives Matter</h3>
                    <p>O assassinato de George Floyd, em 2020, desencadeou protestos globais sob o lema Black Lives Matter. À primeira vista, parecia um ato isolado de violência policial. A imaginação sociológica, porém, nos permite perceber que se tratava de uma manifestação de <strong>racismo estrutural</strong>, enraizado nas instituições americanas desde a escravidão. A dor da família Floyd era uma tragédia pessoal, mas os protestos mundiais revelaram que milhões de pessoas compartilhavam daquela experiência ou se solidarizavam contra a opressão racial. Mills nos ensinaria que esses eventos não podem ser entendidos apenas como "conduta desviante" de policiais individuais; devem ser investigados como expressão de desigualdades históricas, segregação residencial, disparidades econômicas e um sistema de justiça criminal que pune desproporcionalmente pessoas negras.</p>
                </div>
            </div>`,

            // ----- TÓPICO 7: A elite do poder -----
            `<div class="img-text-row right-image">
                <div class="text-container">
                    <h3>7. A elite do poder</h3>
                    <p>Em <em>A elite do poder</em> (1956), Mills analisou a concentração de poder nos Estados Unidos. Ele identificou três esferas interligadas: a <strong>elite militar</strong> (os altos comandantes), a <strong>elite econômica</strong> (os grandes corporações e banqueiros) e a <strong>elite política</strong> (os ocupantes dos cargos mais altos do Executivo). Esses três grupos não apenas se sobrepõem (generais tornam‑se conselheiros de empresas, empresários financiam campanhas políticas), como também tomam decisões que afetam milhões de pessoas sem que a maioria da população tenha qualquer poder de influência. A imaginação sociológica, para Mills, era também uma arma contra essa oligarquia – ao revelar as conexões ocultas entre as elites, o cidadão comum poderia questionar a suposta democracia americana e exigir participação real.</p>
                </div>
                <div class="img-container">
                    <img src="https://m.media-amazon.com/images/I/71GHYQHJW5L._AC_UF1000,1000_QL80_.jpg" alt="Capa do livro A Elite do Poder" aria-hidden="true">
                </div>
            </div>`,

            // ----- TÓPICO 8: Relevância atual -----
            `<div class="img-text-row left-image">
                <div class="img-container">
                    <img src="https://cdn.pixabay.com/photo/2020/06/04/23/21/protest-5260587_960_720.jpg" alt="Manifestação por justiça social" aria-hidden="true">
                </div>
                <div class="text-container">
                    <h3>8. Relevância atual da imaginação sociológica</h3>
                    <p>No século XXI, a imaginação sociológica permanece mais necessária que nunca. Questões como as mudanças climáticas, a desigualdade econômica crescente, as migrações em massa, a pandemia de Covid‑19, o desemprego tecnológico e a ascensão de movimentos autoritários não podem ser entendidas como problemas individuais. São fenômenos que exigem uma análise que conecte biografia e história, pessoa e estrutura. Mills nos lembra que a sociologia não é apenas um conjunto de métodos ou teorias – é uma forma de engajamento moral com o mundo. Ao desenvolver a imaginação sociológica, cada pessoa pode compreender seu lugar na sociedade, identificar as forças que moldam sua vida e, potencialmente, agir para transformá‑las.</p>
                </div>
            </div>`,

            // PÁGINA FINAL - CONGRATULAÇÕES
            `<div class="congrats-page">
                <h2>🎉 Parabéns!</h2>
                <p>Você concluiu o estudo sobre Charles Wright Mills e a imaginação sociológica.</p>
                <p>A distinção entre problemas pessoais e questões públicas, a crítica à elite do poder e o chamado ao engajamento intelectual fazem de Mills um autor indispensável para compreender a sociedade contemporânea.</p>
                <p>"Nem a vida de um indivíduo nem a história de uma sociedade podem ser compreendidas sem que ambas sejam compreendidas em conjunto." — C. Wright Mills</p>
            </div>`
        ];

        const totalPages = pageContents.length;
        let currentPage = 0;
        let fontSizeIndex = 4;
        const fontSizes = [12, 14, 16, 18, 20, 24, 28, 32, 38, 42];

        const pageContentDiv = document.getElementById('pageContent');
        const pageXofY = document.getElementById('pageXofY');
        const progressFill = document.getElementById('progressFill');
        const progressPercent = document.getElementById('progressPercent');
        const fontMinus = document.getElementById('fontMinusBtn');
        const fontPlus = document.getElementById('fontPlusBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const prevBtn = document.getElementById('prevBtnInline');
        const nextBtn = document.getElementById('nextBtnInline');
        const speakBtn = document.getElementById('speakBtn');
        const rateSelect = document.getElementById('rateSelect');

        let synth = window.speechSynthesis;
        let currentUtterance = null;
        let isSpeaking = false;

        function getFemaleVoice() {
            const voices = synth.getVoices();
            const ptVoices = voices.filter(v => v.lang === 'pt-BR');
            const female = ptVoices.find(v => v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('mulher') || v.name.includes('Samantha') || v.name.includes('Maria'));
            return female || ptVoices[0] || voices[0];
        }

        function updateUI() {
            pageContentDiv.innerHTML = pageContents[currentPage];
            const num = currentPage + 1;
            pageXofY.textContent = `Página ${num} de ${totalPages}`;
            const pct = (num / totalPages) * 100;
            progressFill.style.width = pct + '%';
            progressPercent.textContent = Math.round(pct) + '%';
            prevBtn.disabled = (currentPage === 0);
            nextBtn.disabled = (currentPage === totalPages - 1);
            stopReading();
            if (pageContentDiv.scrollTop) pageContentDiv.scrollTop = 0;
        }

        function applyFontSize() {
            const size = fontSizes[fontSizeIndex] + 'px';
            pageContentDiv.style.fontSize = size;
            fontMinus.disabled = (fontSizeIndex === 0);
            fontPlus.disabled = (fontSizeIndex === fontSizes.length-1);
        }

        function changePage(delta) {
            const newPage = currentPage + delta;
            if (newPage >= 0 && newPage < totalPages) {
                currentPage = newPage;
                updateUI();
            }
        }

        function startReading() {
            if (!synth) { alert('Seu navegador não suporta síntese de voz.'); return; }
            if (isSpeaking) { stopReading(); return; }
            const text = pageContentDiv.innerText;
            if (!text.trim()) return;
            currentUtterance = new SpeechSynthesisUtterance(text);
            const voice = getFemaleVoice();
            if (voice) currentUtterance.voice = voice;
            currentUtterance.rate = parseFloat(rateSelect.value);
            currentUtterance.onend = function() {
                isSpeaking = false;
                currentUtterance = null;
                speakBtn.textContent = '🔊';
            };
            synth.speak(currentUtterance);
            isSpeaking = true;
            speakBtn.textContent = '⏹️';
        }

        function stopReading() {
            if (synth && synth.speaking) synth.cancel();
            if (currentUtterance) {
                currentUtterance.onend = null;
                currentUtterance = null;
            }
            isSpeaking = false;
            speakBtn.textContent = '🔊';
        }

        fontMinus.addEventListener('click', () => { if (fontSizeIndex > 0) fontSizeIndex--; applyFontSize(); });
        fontPlus.addEventListener('click', () => { if (fontSizeIndex < fontSizes.length-1) fontSizeIndex++; applyFontSize(); });
        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) document.exitFullscreen();
            else document.documentElement.requestFullscreen();
        });
        prevBtn.addEventListener('click', () => changePage(-1));
        nextBtn.addEventListener('click', () => changePage(1));
        speakBtn.addEventListener('click', startReading);
        rateSelect.addEventListener('change', () => {
            if (isSpeaking && currentUtterance) currentUtterance.rate = parseFloat(rateSelect.value);
        });

        applyFontSize();
        updateUI();
        if (synth) synth.getVoices();
    })();
</script>
</body>
</html>
