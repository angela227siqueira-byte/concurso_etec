<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>📘 Noções Básicas de Informática</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Verdana', 'Arial', sans-serif;
            background: #f5f7f6;
            color: #1a2e2a;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            margin: 0;
        }

        .reader-wrapper {
            width: 100%;
            max-width: 85%;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.04);
            padding: 20px 30px;
            border: 1px solid #dde5e0;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        .fixed-header {
            margin-bottom: 12px;
            border-bottom: 2px solid #dde5e0;
            padding-bottom: 8px;
        }
        .fixed-header h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #0f3d2e;
            line-height: 1.2;
            margin-bottom: 6px;
        }
        .progress-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.9rem;
            font-weight: 600;
            color: #1a5e44;
            margin-bottom: 6px;
        }
        .progress-bar-bg {
            background: #dee6e1;
            height: 7px;
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            background: #1a7a58;
            height: 7px;
            width: 0%;
            border-radius: 20px;
            transition: width 0.2s;
        }

        .text-content {
            text-align: justify;
            padding: 8px 0 16px;
            max-height: 58vh;
            overflow-y: auto;
            font-size: 18px;
            line-height: 1.5;
            margin: 0 2px;
            scroll-behavior: smooth;
        }
        .text-content p {
            margin-bottom: 1em;
        }
        .text-content h2, .text-content h3, .text-content h4 {
            margin: 1.2em 0 0.3em;
            color: #154e3a;
            font-weight: 600;
        }

        .img-text-row {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .img-container {
            flex: 0 0 auto;
            max-width: 35vw;
            text-align: center;
        }
        .img-container img {
            height: 50vh;
            max-height: 400px;
            width: auto;
            max-width: 100%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .text-container {
            flex: 1;
            min-width: 200px;
        }
        .right-image .text-container { order: 1; }
        .right-image .img-container { order: 2; }
        .left-image .text-container { order: 2; }
        .left-image .img-container { order: 1; }

        .toolbar-single {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            margin: 18px 0 14px;
            padding: 4px 0 8px;
            border-top: 1px solid #dde5e0;
            border-bottom: 1px solid #dde5e0;
        }
        .tool-btn {
            background: #ecf3ef;
            border: 1px solid #b3cdbf;
            color: #134531;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 10px 14px;
            border-radius: 48px;
            min-width: 60px;
            text-align: center;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .tool-btn:active { background: #d0e0d7; transform: scale(0.96); }
        .tool-btn:disabled { opacity: 0.4; background: #e0e8e3; border-color: #b6ccc1; pointer-events: none; }
        select.tool-btn { background: #ecf3ef; width: auto; }

        .capa {
            text-align: center;
            padding: 40px 20px;
        }
        .capa h1 { font-size: 36px; margin-bottom: 20px; color: #0f3d2e; }
        .capa h2 { font-size: 28px; margin-bottom: 40px; color: #1a5e44; }
        .capa p { font-size: 22px; color: #2a5e4a; }

        .congrats-page {
            text-align: center;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 50vh;
        }
        .congrats-page h2 { color: #1a5e44; margin-bottom: 10px; font-size: 2rem; }
        .congrats-page p { margin: 20px 0; }

        @media (max-width: 700px) {
            .reader-wrapper { max-width: 98%; padding: 15px; }
            .tool-btn { padding: 8px 10px; min-width: 50px; font-size: 0.9rem; }
            .img-text-row { flex-direction: column; }
            .img-container { max-width: 100%; text-align: center; }
            .img-container img { height: auto; max-height: 300px; width: auto; max-width: 90%; }
            .right-image .text-container, .right-image .img-container,
            .left-image .text-container, .left-image .img-container { order: unset; }
            .capa h1 { font-size: 28px; }
            .capa h2 { font-size: 24px; }
            .capa p { font-size: 18px; }
        }
    </style>
</head>
<body>
<div class="reader-wrapper">
    <div id="readerScreen" class="screen active">
        <div class="fixed-header">
            <h1>Noções Básicas de Informática</h1>
            <div class="progress-row">
                <span id="pageXofY">Página 1 de 10</span>
                <span id="progressPercent">10%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>
        <div class="text-content" id="pageContent"></div>
        <div class="toolbar-single">
            <button class="tool-btn" id="fontMinusBtn" title="Diminuir fonte">A−</button>
            <button class="tool-btn" id="fontPlusBtn" title="Aumentar fonte">A+</button>
            <button class="tool-btn" id="fullscreenBtn" title="Tela cheia">⛶</button>
            <button class="tool-btn" id="prevBtnInline" title="Página anterior">◀</button>
            <button class="tool-btn" id="nextBtnInline" title="Próxima página">▶</button>
            <button class="tool-btn" id="speakBtn" title="Ouvir/Parar">🔊</button>
            <select id="rateSelect" class="tool-btn" style="width: auto;">
                <option value="0.75">0.75x</option>
                <option value="1" selected>1x</option>
                <option value="1.25">1.25x</option>
                <option value="1.5">1.5x</option>
                <option value="2">2x</option>
            </select>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- CONTEÚDO DAS PÁGINAS ----------
        const pageContents = [
            // PÁGINA 0 - CAPA
            `<div class="capa">
                <h1>Noções Básicas de Informática</h1>
                <h2>Windows · Word · Excel<br>PowerPoint · Internet</h2>
                <p>Guia de estudos para concursos e aperfeiçoamento profissional</p>
            </div>`,

            // PÁGINA 1 - ÍNDICE
            `<div class="text-container" style="max-width:100%;">
                <h3>📌 Sumário</h3>
                <ol>
                    <li>1. Sistema Operacional Windows</li>
                    <li>2. Principais recursos do Windows</li>
                    <li>3. Microsoft Word – Processador de textos</li>
                    <li>4. Word – Formatação e ferramentas</li>
                    <li>5. Microsoft Excel – Planilhas eletrônicas</li>
                    <li>6. Excel – Fórmulas e funções essenciais</li>
                    <li>7. Microsoft PowerPoint – Apresentações</li>
                    <li>8. Internet – Conceitos e navegação</li>
                </ol>
            </div>`,

            // ----- TÓPICO 1: Windows -----
            `<div class="img-text-row right-image">
                <div class="text-container">
                    <h3>1. Sistema Operacional Windows</h3>
                    <p>O <strong>Windows</strong> é o sistema operacional mais utilizado em computadores pessoais no mundo. Desenvolvido pela Microsoft, ele gerencia o hardware e o software, fornecendo uma interface gráfica amigável. A <strong>Área de Trabalho</strong> (Desktop) é a tela principal, onde ficam ícones de atalho, a Barra de Tarefas e o Botão Iniciar. Através do <strong>Menu Iniciar</strong>, o usuário acessa programas, configurações e arquivos. O Windows também inclui o <strong>Explorador de Arquivos</strong> (Windows Explorer), que permite navegar, copiar, mover e organizar pastas e documentos. Versões recentes, como Windows 10 e 11, oferecem integração com a nuvem (OneDrive), assistente virtual (Cortana) e múltiplas áreas de trabalho virtuais.</p>
                </div>
                <div class="img-container">
                    <img src="https://img.freepik.com/free-photo/operating-system-windows-10-interface_23-2148892678.jpg" alt="Interface do Windows 10" aria-hidden="true">
                </div>
            </div>`,

            // ----- TÓPICO 2: Recursos do Windows -----
            `<div class="img-text-row left-image">
                <div class="img-container">
                    <img src="https://img.freepik.com/free-vector/windows-operating-system-concept-illustration_114360-35543.jpg" alt="Recursos do Windows" aria-hidden="true">
                </div>
                <div class="text-container">
                    <h3>2. Principais recursos do Windows</h3>
                    <p>O Windows oferece diversas ferramentas essenciais: o <strong>Painel de Controle</strong> (e as Configurações) permitem ajustar hardware, contas de usuário e segurança. A <strong>Lixeira</strong> armazena temporariamente arquivos excluídos. O <strong>Gerenciador de Tarefas</strong> (Ctrl + Alt + Del) exibe os programas em execução e permite finalizar processos. O <strong>Windows Defender</strong> é o antivírus integrado. Atalhos de teclado aumentam a produtividade: <strong>Ctrl + C</strong> (copiar), <strong>Ctrl + V</strong> (colar), <strong>Ctrl + X</strong> (recortar), <strong>Ctrl + Z</strong> (desfazer), <strong>Alt + Tab</strong> (alternar janelas), <strong>Win + E</strong> (abrir Explorador de Arquivos) e <strong>Win + L</strong> (bloquear a tela).</p>
                </div>
            </div>`,

            // ----- TÓPICO 3: Word -----
            `<div class="img-text-row right-image">
                <div class="text-container">
                    <h3>3. Microsoft Word – Processador de textos</h3>
                    <p>O <strong>Microsoft Word</strong> é o editor de textos do pacote Office. Com ele, é possível criar documentos profissionais, cartas, currículos, relatórios e muito mais. A interface é composta por faixas de opções (guias) que organizam as ferramentas: <strong>Página Inicial</strong> (formatação básica da fonte, parágrafo, estilos), <strong>Inserir</strong> (tabelas, imagens, formas, cabeçalho e rodapé), <strong>Layout da Página</strong> (margens, orientação, colunas), <strong>Referências</strong> (sumário, notas de rodapé) e <strong>Revisão</strong> (ortografia, comentários). O Word também permite o uso de modelos prontos e a colaboração em tempo real via OneDrive.</p>
                </div>
                <div class="img-container">
                    <img src="https://img.freepik.com/free-vector/word-concept-illustration_114360-5962.jpg" alt="Ilustração do Microsoft Word" aria-hidden="true">
                </div>
            </div>`,

            // ----- TÓPICO 4: Word - formatação -----
            `<div class="img-text-row left-image">
                <div class="img-container">
                    <img src="https://img.freepik.com/free-vector/document-concept-illustration_114360-2629.jpg" alt="Documento com formatação" aria-hidden="true">
                </div>
                <div class="text-container">
                    <h3>4. Word – Formatação e ferramentas avançadas</h3>
                    <p>O Word oferece recursos como <strong>Mala Direta</strong>, que combina um documento principal com uma lista de destinatários (do Excel, por exemplo) para gerar cartas ou etiquetas personalizadas. O <strong>Controle de Alterações</strong> registra edições feitas por diferentes usuários, útil em revisões colaborativas. As <strong>Seções</strong> permitem dividir o documento em partes com formatações independentes (orientação retrato/paisagem, diferentes cabeçalhos). Outras funcionalidades incluem <strong>inserir gráficos</strong>, <strong>equações</strong>, e a <strong>pesquisa inteligente</strong>. O atalho <strong>Ctrl + B</strong> salva o documento; <strong>Ctrl + P</strong> imprime; e <strong>F7</strong> aciona o corretor ortográfico.</p>
                </div>
            </div>`,

            // ----- TÓPICO 5: Excel -----
            `<div class="img-text-row right-image">
                <div class="text-container">
                    <h3>5. Microsoft Excel – Planilhas eletrônicas</h3>
                    <p>O <strong>Microsoft Excel</strong> é a ferramenta de planilhas do Office, amplamente utilizada para cálculos, análises de dados e gráficos. Uma planilha é formada por <strong>células</strong> organizadas em <strong>linhas</strong> (numeradas) e <strong>colunas</strong> (letras). O endereço da célula é a combinação da letra da coluna e o número da linha (ex.: A1, B5). O Excel suporta diversos tipos de dados: números, texto, datas e fórmulas. A <strong>Barra de Fórmulas</strong> exibe o conteúdo da célula ativa. É possível criar <strong>gráficos</strong> (coluna, pizza, linha, etc.) a partir dos dados selecionados, usar <strong>tabelas dinâmicas</strong> para resumir grandes volumes de informação e aplicar <strong>formatação condicional</strong> para destacar valores.</p>
                </div>
                <div class="img-container">
                    <img src="https://img.freepik.com/free-vector/spreadsheet-concept-illustration_114360-1321.jpg" alt="Ilustração do Excel" aria-hidden="true">
                </div>
            </div>`,

            // ----- TÓPICO 6: Excel - Fórmulas -----
            `<div class="img-text-row left-image">
                <div class="img-container">
                    <img src="https://img.freepik.com/free-vector/data-analysis-concept-illustration_114360-30035.jpg" alt="Gráficos e dados no Excel" aria-hidden="true">
                </div>
                <div class="text-container">
                    <h3>6. Excel – Fórmulas e funções essenciais</h3>
                    <p>Uma <strong>fórmula</strong> começa com o sinal de igual (=) e pode conter operadores matemáticos (+, -, *, /). As funções pré-definidas facilitam cálculos: <strong>=SOMA(A1:A5)</strong> soma os valores do intervalo; <strong>=MÉDIA(B2:B10)</strong> calcula a média; <strong>=MÁXIMO(C1:C20)</strong> retorna o maior valor; <strong>=MÍNIMO</strong> retorna o menor. A função <strong>=SE(condição;valor_se_verdadeiro;valor_se_falso)</strong> permite decisões lógicas. Para buscas, o <strong>=PROCV(valor_procurado;matriz;coluna_retorno;procurar_intervalo)</strong> pesquisa verticalmente em tabelas. Referências de células podem ser <strong>relativas</strong> (A1), <strong>absolutas</strong> ($A$1) ou <strong>mistas</strong> ($A1 ou A$1), mudando o comportamento ao copiar a fórmula.</p>
                </div>
            </div>`,

            // ----- TÓPICO 7: PowerPoint -----
            `<div class="img-text-row right-image">
                <div class="text-container">
                    <h3>7. Microsoft PowerPoint – Apresentações</h3>
                    <p>O <strong>PowerPoint</strong> é o software de criação de apresentações visuais. Cada apresentação é composta por <strong>slides</strong> individuais. O usuário pode inserir texto, imagens, tabelas, gráficos, vídeos e áudio. Para dar dinamismo, aplicam-se <strong>animações</strong> a elementos dentro de um slide (como fazer um texto surgir) e <strong>transições</strong> entre slides (efeitos de passagem). O <strong>Slide Mestre</strong> controla o layout e a formatação de todos os slides, garantindo consistência visual. O PowerPoint oferece modelos pré-definidos (Design) e permite configurar a apresentação para avançar automaticamente com o recurso <strong>Ensaiar Intervalos</strong>.</p>
                </div>
                <div class="img-container">
                    <img src="https://img.freepik.com/free-vector/presentation-concept-illustration_114360-1695.jpg" alt="Ilustração do PowerPoint" aria-hidden="true">
                </div>
            </div>`,

            // ----- TÓPICO 8: Internet -----
            `<div class="img-text-row left-image">
                <div class="img-container">
                    <img src="https://img.freepik.com/free-vector/internet-communication-concept_114360-1700.jpg" alt="Conceito de Internet" aria-hidden="true">
                </div>
                <div class="text-container">
                    <h3>8. Internet – Conceitos e navegação</h3>
                    <p>A <strong>Internet</strong> é uma rede mundial de computadores interconectados que permite o compartilhamento de informações. O acesso é feito por meio de <strong>navegadores</strong> (browsers) como Google Chrome, Microsoft Edge e Mozilla Firefox. Os endereços da web utilizam <strong>URLs</strong> (Uniform Resource Locator) e são acessados via protocolos como <strong>HTTP</strong> e <strong>HTTPS</strong> (versão segura com criptografia). O <strong>e-mail</strong> (correio eletrônico) é uma das principais ferramentas de comunicação, baseado em servidores que utilizam protocolos SMTP (envio), POP3 e IMAP (recebimento). A segurança digital é fundamental: <strong>firewalls</strong> controlam o tráfego de rede, e um bom <strong>antivírus</strong> protege contra malwares. <strong>Cookies</strong> são pequenos arquivos que armazenam preferências do usuário nos sites.</p>
                </div>
            </div>`,

            // PÁGINA FINAL - CONGRATULAÇÕES
            `<div class="congrats-page">
                <h2>🎉 Parabéns!</h2>
                <p>Você concluiu o estudo das noções básicas de informática.</p>
                <p>Compreender o funcionamento do Windows e das ferramentas do Office, aliado ao conhecimento sobre internet, é essencial para a produtividade no ambiente de trabalho e para a realização de provas de concursos públicos.</p>
                <p>Continue praticando e explorando os recursos de cada programa!</p>
            </div>`
        ];

        const totalPages = pageContents.length;
        let currentPage = 0;
        let fontSizeIndex = 4;
        const fontSizes = [12, 14, 16, 18, 20, 24, 28, 32, 38, 42];

        const pageContentDiv = document.getElementById('pageContent');
        const pageXofY = document.getElementById('pageXofY');
        const progressFill = document.getElementById('progressFill');
        const progressPercent = document.getElementById('progressPercent');
        const fontMinus = document.getElementById('fontMinusBtn');
        const fontPlus = document.getElementById('fontPlusBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const prevBtn = document.getElementById('prevBtnInline');
        const nextBtn = document.getElementById('nextBtnInline');
        const speakBtn = document.getElementById('speakBtn');
        const rateSelect = document.getElementById('rateSelect');

        let synth = window.speechSynthesis;
        let currentUtterance = null;
        let isSpeaking = false;

        function getFemaleVoice() {
            const voices = synth.getVoices();
            const ptVoices = voices.filter(v => v.lang === 'pt-BR');
            const female = ptVoices.find(v => v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('mulher') || v.name.includes('Samantha') || v.name.includes('Maria'));
            return female || ptVoices[0] || voices[0];
        }

        function updateUI() {
            pageContentDiv.innerHTML = pageContents[currentPage];
            const num = currentPage + 1;
            pageXofY.textContent = `Página ${num} de ${totalPages}`;
            const pct = (num / totalPages) * 100;
            progressFill.style.width = pct + '%';
            progressPercent.textContent = Math.round(pct) + '%';
            prevBtn.disabled = (currentPage === 0);
            nextBtn.disabled = (currentPage === totalPages - 1);
            stopReading();
            if (pageContentDiv.scrollTop) pageContentDiv.scrollTop = 0;
        }

        function applyFontSize() {
            const size = fontSizes[fontSizeIndex] + 'px';
            pageContentDiv.style.fontSize = size;
            fontMinus.disabled = (fontSizeIndex === 0);
            fontPlus.disabled = (fontSizeIndex === fontSizes.length-1);
        }

        function changePage(delta) {
            const newPage = currentPage + delta;
            if (newPage >= 0 && newPage < totalPages) {
                currentPage = newPage;
                updateUI();
            }
        }

        function startReading() {
            if (!synth) { alert('Seu navegador não suporta síntese de voz.'); return; }
            if (isSpeaking) { stopReading(); return; }
            const text = pageContentDiv.innerText;
            if (!text.trim()) return;
            currentUtterance = new SpeechSynthesisUtterance(text);
            const voice = getFemaleVoice();
            if (voice) currentUtterance.voice = voice;
            currentUtterance.rate = parseFloat(rateSelect.value);
            currentUtterance.onend = function() {
                isSpeaking = false;
                currentUtterance = null;
                speakBtn.textContent = '🔊';
            };
            synth.speak(currentUtterance);
            isSpeaking = true;
            speakBtn.textContent = '⏹️';
        }

        function stopReading() {
            if (synth && synth.speaking) synth.cancel();
            if (currentUtterance) {
                currentUtterance.onend = null;
                currentUtterance = null;
            }
            isSpeaking = false;
            speakBtn.textContent = '🔊';
        }

        fontMinus.addEventListener('click', () => { if (fontSizeIndex > 0) fontSizeIndex--; applyFontSize(); });
        fontPlus.addEventListener('click', () => { if (fontSizeIndex < fontSizes.length-1) fontSizeIndex++; applyFontSize(); });
        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) document.exitFullscreen();
            else document.documentElement.requestFullscreen();
        });
        prevBtn.addEventListener('click', () => changePage(-1));
        nextBtn.addEventListener('click', () => changePage(1));
        speakBtn.addEventListener('click', startReading);
        rateSelect.addEventListener('change', () => {
            if (isSpeaking && currentUtterance) currentUtterance.rate = parseFloat(rateSelect.value);
        });

        applyFontSize();
        updateUI();
        if (synth) synth.getVoices();
    })();
</script>
</body>
</html>
