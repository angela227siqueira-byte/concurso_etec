<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>📘 Noções Básicas de Informática · Foco em Concursos</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Verdana', 'Arial', sans-serif;
            background: #f5f7f6;
            color: #1a2e2a;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            margin: 0;
        }

        .reader-wrapper {
            width: 100%;
            max-width: 85%;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.04);
            padding: 20px 30px;
            border: 1px solid #dde5e0;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        .fixed-header {
            margin-bottom: 12px;
            border-bottom: 2px solid #dde5e0;
            padding-bottom: 8px;
        }
        .fixed-header h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #0f3d2e;
            line-height: 1.2;
            margin-bottom: 6px;
        }
        .progress-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.9rem;
            font-weight: 600;
            color: #1a5e44;
            margin-bottom: 6px;
        }
        .progress-bar-bg {
            background: #dee6e1;
            height: 7px;
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            background: #1a7a58;
            height: 7px;
            width: 0%;
            border-radius: 20px;
            transition: width 0.2s;
        }

        .text-content {
            text-align: justify;
            padding: 8px 0 16px;
            max-height: 58vh;
            overflow-y: auto;
            font-size: 18px;
            line-height: 1.5;
            margin: 0 2px;
            scroll-behavior: smooth;
        }
        .text-content p {
            margin-bottom: 1em;
        }
        .text-content h2, .text-content h3, .text-content h4 {
            margin: 1.2em 0 0.3em;
            color: #154e3a;
            font-weight: 600;
        }

        .img-text-row {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .img-container {
            flex: 0 0 auto;
            max-width: 35vw;
            text-align: center;
        }
        .img-container img {
            height: 50vh;
            max-height: 400px;
            width: auto;
            max-width: 100%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .text-container {
            flex: 1;
            min-width: 200px;
        }
        .right-image .text-container { order: 1; }
        .right-image .img-container { order: 2; }
        .left-image .text-container { order: 2; }
        .left-image .img-container { order: 1; }

        .toolbar-single {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            margin: 18px 0 14px;
            padding: 4px 0 8px;
            border-top: 1px solid #dde5e0;
            border-bottom: 1px solid #dde5e0;
        }
        .tool-btn {
            background: #ecf3ef;
            border: 1px solid #b3cdbf;
            color: #134531;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 10px 14px;
            border-radius: 48px;
            min-width: 60px;
            text-align: center;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .tool-btn:active { background: #d0e0d7; transform: scale(0.96); }
        .tool-btn:disabled { opacity: 0.4; background: #e0e8e3; border-color: #b6ccc1; pointer-events: none; }
        select.tool-btn { background: #ecf3ef; width: auto; }

        .capa {
            text-align: center;
            padding: 40px 20px;
        }
        .capa h1 { font-size: 36px; margin-bottom: 20px; color: #0f3d2e; }
        .capa h2 { font-size: 28px; margin-bottom: 40px; color: #1a5e44; }
        .capa p { font-size: 22px; color: #2a5e4a; }

        .congrats-page {
            text-align: center;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 50vh;
        }
        .congrats-page h2 { color: #1a5e44; margin-bottom: 10px; font-size: 2rem; }
        .congrats-page p { margin: 20px 0; }

        @media (max-width: 700px) {
            .reader-wrapper { max-width: 98%; padding: 15px; }
            .tool-btn { padding: 8px 10px; min-width: 50px; font-size: 0.9rem; }
            .img-text-row { flex-direction: column; }
            .img-container { max-width: 100%; text-align: center; }
            .img-container img { height: auto; max-height: 300px; width: auto; max-width: 90%; }
            .right-image .text-container, .right-image .img-container,
            .left-image .text-container, .left-image .img-container { order: unset; }
            .capa h1 { font-size: 28px; }
            .capa h2 { font-size: 24px; }
            .capa p { font-size: 18px; }
        }
    </style>
</head>
<body>
<div class="reader-wrapper">
    <div id="readerScreen" class="screen active">
        <div class="fixed-header">
            <h1>Noções Básicas de Informática</h1>
            <div class="progress-row">
                <span id="pageXofY">Página 1 de 15</span>
                <span id="progressPercent">7%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>
        <div class="text-content" id="pageContent"></div>
        <div class="toolbar-single">
            <button class="tool-btn" id="fontMinusBtn" title="Diminuir fonte">A−</button>
            <button class="tool-btn" id="fontPlusBtn" title="Aumentar fonte">A+</button>
            <button class="tool-btn" id="fullscreenBtn" title="Tela cheia">⛶</button>
            <button class="tool-btn" id="prevBtnInline" title="Página anterior">◀</button>
            <button class="tool-btn" id="nextBtnInline" title="Próxima página">▶</button>
            <button class="tool-btn" id="speakBtn" title="Ouvir/Parar">🔊</button>
            <select id="rateSelect" class="tool-btn" style="width: auto;">
                <option value="0.75">0.75x</option>
                <option value="1" selected>1x</option>
                <option value="1.25">1.25x</option>
                <option value="1.5">1.5x</option>
                <option value="2">2x</option>
            </select>
        </div>
    </div>
</div>

<script>
    (function(){
        const pageContents = [
            // PÁGINA 0 - CAPA
            `<div class="capa">
                <h1>Noções Básicas de Informática</h1>
                <h2>Windows · Word · Excel<br>PowerPoint · Internet</h2>
                <p>Material aprofundado com foco em Concursos Públicos</p>
            </div>`,

            // PÁGINA 1 - ÍNDICE
            `<div class="text-container" style="max-width:100%;">
                <h3>📌 Sumário</h3>
                <ol>
                    <li>1. Sistema Operacional Windows – conceitos e operações</li>
                    <li>2. Atalhos essenciais do Windows para provas</li>
                    <li>3. Ferramentas do sistema e segurança</li>
                    <li>4. Microsoft Word – processador de textos</li>
                    <li>5. Word – Atalhos, revisão e mala direta</li>
                    <li>6. Microsoft Excel – planilhas e referências</li>
                    <li>7. Excel – Fórmulas e funções cobradas em concursos</li>
                    <li>8. Excel – Gráficos e análise de dados</li>
                    <li>9. Microsoft PowerPoint – criação e apresentação</li>
                    <li>10. Internet – fundamentos e protocolos</li>
                    <li>11. Correio eletrônico e segurança digital</li>
                    <li>12. Questões comentadas de concursos anteriores</li>
                </ol>
            </div>`,

            // ----- 1: Windows – conceitos -----
            `<div class="img-text-row right-image">
                <div class="text-container">
                    <h3>1. Sistema Operacional Windows</h3>
                    <p>O <strong>Windows</strong> é o sistema operacional da Microsoft. Em concursos, são cobrados: <strong>Área de Trabalho</strong> (desktop) com ícones e atalhos; <strong>Barra de Tarefas</strong> (programas abertos, notificações, data/hora); <strong>Menu Iniciar</strong> (programas, configurações, desligar); e <strong>Explorador de Arquivos</strong> (antigo Windows Explorer, navegação por pastas com hierarquia em árvore). O Windows gerencia hardware (impressoras, discos) e software (instalação, execução de programas). As versões mais recentes (10 e 11) trazem <strong>OneDrive</strong> (nuvem integrada) e múltiplas áreas de trabalho virtuais. Um conceito importante: o <strong>sistema de arquivos NTFS</strong> oferece segurança com permissões e criptografia, enquanto o FAT32 é mais antigo e limitado a arquivos de até 4GB.</p>
                </div>
                <div class="img-container">
                    <img src="https://img.freepik.com/free-vector/windows-operating-system-concept-illustration_114360-35543.jpg" alt="Interface do Windows" aria-hidden="true">
                </div>
            </div>`,

            // ----- 2: Atalhos do Windows -----
            `<div class="img-text-row left-image">
                <div class="img-container">
                    <img src="https://img.freepik.com/free-vector/keyboard-keys-concept-illustration_114360-14719.jpg" alt="Teclado com atalhos" aria-hidden="true">
                </div>
                <div class="text-container">
                    <h3>2. Atalhos do Windows mais cobrados</h3>
                    <p>Os atalhos de teclado são presença constante em provas. Os principais: <strong>Ctrl + C</strong> (copiar), <strong>Ctrl + V</strong> (colar), <strong>Ctrl + X</strong> (recortar), <strong>Ctrl + Z</strong> (desfazer), <strong>Ctrl + A</strong> (selecionar tudo); <strong>Alt + Tab</strong> (alternar entre janelas abertas); <strong>Win + D</strong> (mostrar área de trabalho); <strong>Win + E</strong> (abrir Explorador de Arquivos); <strong>Win + L</strong> (bloquear o computador); <strong>Win + I</strong> (abrir Configurações); <strong>Win + R</strong> (abrir caixa "Executar"); <strong>Ctrl + Alt + Del</strong> (tela de segurança: bloquear, trocar usuário, Gerenciador de Tarefas, sair). Para captura de tela: <strong>Print Screen</strong> (captura a tela inteira) e <strong>Win + Shift + S</strong> (ferramenta de captura recortada).</p>
                </div>
            </div>`,

            // ----- 3: Ferramentas do sistema e segurança -----
            `<div class="img-text-row right-image">
                <div class="text-container">
                    <h3>3. Ferramentas do sistema e segurança</h3>
                    <p>O <strong>Gerenciador de Tarefas</strong> (Ctrl + Shift + Esc) mostra processos, desempenho e permite finalizar programas travados. A <strong>Lixeira</strong> armazena arquivos excluídos até seu esvaziamento; arquivos excluídos com Shift + Del não vão para a Lixeira, sendo deletados permanentemente. O <strong>Windows Update</strong> mantém o sistema corrigido. No campo da segurança, o <strong>Windows Defender</strong> é o antivírus nativo, com proteção em tempo real e firewall integrado. O <strong>Firewall</strong> controla o tráfego de rede, bloqueando acessos não autorizados. A <strong>Restauração do Sistema</strong> cria pontos de restauração, permitindo reverter configurações problemáticas. Para backup, o <strong>Histórico de Arquivos</strong> salva cópias automáticas em unidade externa.</p>
                </div>
                <div class="img-container">
                    <img src="https://img.freepik.com/free-vector/cyber-security-concept-illustration_114360-1636.jpg" alt="Segurança digital" aria-hidden="true">
                </div>
            </div>`,

            // ----- 4: Word – básico -----
            `<div class="img-text-row left-image">
                <div class="img-container">
                    <img src="https://img.freepik.com/free-vector/word-concept-illustration_114360-5962.jpg" alt="Microsoft Word" aria-hidden="true">
                </div>
                <div class="text-container">
                    <h3>4. Microsoft Word – Processador de textos</h3>
                    <p>O Word organiza ferramentas em guias (faixa de opções): <strong>Página Inicial</strong> (fonte, parágrafo, estilos, localizar/substituir); <strong>Inserir</strong> (tabelas, imagens, formas, cabeçalho/rodapé, número de página, equações, símbolos); <strong>Layout</strong> (margens, orientação, colunas, quebras); <strong>Referências</strong> (sumário automático, notas de rodapé, citações); <strong>Correspondências</strong> (mala direta); <strong>Revisão</strong> (ortografia e gramática – atalho F7, contar palavras, controlar alterações); <strong>Exibição</strong> (layout de impressão, leitura, zoom). É importante conhecer que o Word salva documentos no formato <strong>.docx</strong>, mas também pode gerar <strong>.pdf</strong> e <strong>.txt</strong>. O modo de compatibilidade permite abrir documentos antigos (.doc).</p>
                </div>
            </div>`,

            // ----- 5: Word – atalhos e recursos avançados -----
            `<div class="img-text-row right-image">
                <div class="text-container">
                    <h3>5. Word – Atalhos, revisão e mala direta</h3>
                    <p>Atalhos essenciais no Word: <strong>Ctrl + B</strong> (salvar), <strong>Ctrl + P</strong> (imprimir), <strong>Ctrl + N</strong> (novo documento), <strong>Ctrl + O</strong> (abrir), <strong>Ctrl + U</strong> (localizar e substituir), <strong>F7</strong> (ortografia e gramática). A <strong>Mala Direta</strong> (guia Correspondências) mescla um documento principal com uma fonte de dados (planilha Excel, banco de dados) para gerar documentos personalizados em massa. O <strong>Controle de Alterações</strong> (Revisão) registra edições de diferentes autores. <strong>Seções</strong> (Layout > Quebras) dividem o documento, permitindo orientações diferentes (retrato/paisagem), cabeçalhos independentes ou numeração de páginas reiniciada. O <strong>Sumário automático</strong> é gerado a partir dos estilos Título 1, Título 2 etc.</p>
                </div>
                <div class="img-container">
                    <img src="https://img.freepik.com/free-vector/organizing-projects-concept-illustration_114360-542.jpg" alt="Produtividade no escritório" aria-hidden="true">
                </div>
            </div>`,

            // ----- 6: Excel – planilhas e referências -----
            `<div class="img-text-row left-image">
                <div class="img-container">
                    <img src="https://img.freepik.com/free-vector/spreadsheet-concept-illustration_114360-1321.jpg" alt="Microsoft Excel" aria-hidden="true">
                </div>
                <div class="text-container">
                    <h3>6. Microsoft Excel – Planilhas e referências</h3>
                    <p>O Excel organiza dados em <strong>células</strong> (interseção de linhas numeradas e colunas com letras). A <strong>Barra de Fórmulas</strong> exibe o conteúdo da célula. Referências: <strong>relativa</strong> (A1 – muda ao copiar), <strong>absoluta</strong> ($A$1 – fixa coluna e linha), <strong>mista</strong> ($A1 ou A$1). Para concursos, é fundamental entender que <strong>=A1+B1</strong> copiado para a direita vira <strong>=B1+C1</strong>. Mas <strong>=$A$1+B1</strong> copiado para qualquer lugar mantém a referência à célula A1. O Excel suporta diversos tipos de dados: números, texto (alinhado à esquerda), datas, moeda e fórmulas. A <strong>alça de preenchimento</strong> (canto inferior direito da célula) copia valores ou continua sequências (dias da semana, meses, números).</p>
                </div>
            </div>`,

            // ----- 7: Excel – fórmulas e funções -----
            `<div class="img-text-row right-image">
                <div class="text-container">
                    <h3>7. Excel – Fórmulas e funções para concursos</h3>
                    <p>Fórmulas começam com <strong>=</strong>. Funções essenciais: <strong>=SOMA(intervalo)</strong>, <strong>=MÉDIA(intervalo)</strong>, <strong>=MÁXIMO(intervalo)</strong>, <strong>=MÍNIMO(intervalo)</strong>, <strong>=CONT.NÚM(intervalo)</strong> (conta células com números), <strong>=CONT.VALORES(intervalo)</strong> (conta células não vazias). A função <strong>=SE(condição; verdadeiro; falso)</strong> avalia uma condição lógica. Exemplo: <strong>=SE(A1>=7;"Aprovado";"Reprovado")</strong>. Para buscas, <strong>=PROCV(valor;matriz;coluna;procurar_intervalo)</strong> pesquisa na vertical, exigindo que a coluna de busca seja a primeira da matriz. <strong>=PROCH</strong> faz o mesmo na horizontal. A função <strong>=CONCATENAR</strong> ou o operador <strong>&</strong> unem textos. <strong>=SOMASE</strong> e <strong>=CONT.SE</strong> permitem soma ou contagem condicional. <strong>=HOJE()</strong> e <strong>=AGORA()</strong> retornam data atual e data/hora.</p>
                </div>
                <div class="img-container">
                    <img src="https://img.freepik.com/free-vector/data-analysis-concept-illustration_114360-30035.jpg" alt="Análise de dados" aria-hidden="true">
                </div>
            </div>`,

            // ----- 8: Excel – gráficos e análise -----
            `<div class="img-text-row left-image">
                <div class="img-container">
                    <img src="https://img.freepik.com/free-vector/business-intelligence-concept-illustration_114360-30036.jpg" alt="Gráficos" aria-hidden="true">
                </div>
                <div class="text-container">
                    <h3>8. Excel – Gráficos, formatação condicional e tabelas</h3>
                    <p>Os principais tipos de gráfico: <strong>Coluna/Barras</strong> (comparação), <strong>Pizza</strong> (proporção), <strong>Linha</strong> (evolução temporal), <strong>Dispersão</strong> (relação entre variáveis). A <strong>Formatação Condicional</strong> (Página Inicial) aplica cores automaticamente com base em regras (ex.: destacar notas abaixo de 5 em vermelho). <strong>Tabela Dinâmica</strong> (Inserir) resume grandes volumes de dados com arrastar e soltar, permitindo cruzamentos. <strong>Filtros</strong> (Dados > Filtro) selecionam subconjuntos de dados. <strong>Validação de Dados</strong> restringe entradas na célula (ex.: apenas números entre 0 e 10). Recursos como <strong>Remover Duplicatas</strong> e <strong>Texto para Colunas</strong> economizam tempo em provas práticas. A extensão padrão é <strong>.xlsx</strong>.</p>
                </div>
            </div>`,

            // ----- 9: PowerPoint -----
            `<div class="img-text-row right-image">
                <div class="text-container">
                    <h3>9. Microsoft PowerPoint – Apresentações</h3>
                    <p>O PowerPoint compõe apresentações com <strong>slides</strong>. A guia <strong>Design</strong> aplica temas prontos, cores e fontes. O <strong>Slide Mestre</strong> (Exibição) padroniza todo o conjunto de slides. <strong>Animações</strong> são efeitos aplicados a objetos dentro de um slide (texto, imagem); <strong>Transições</strong> são efeitos entre slides (Esmaecer, Empurrar, Revelar). O recurso <strong>Ensaiar Intervalos</strong> grava o tempo de exibição de cada slide, permitindo avanço automático. É possível <strong>ocultar slides</strong> que não devem aparecer na apresentação. A extensão padrão é <strong>.pptx</strong>. O PowerPoint suporta inserção de vídeos, áudios e narrações. Para provas, é importante saber que slides podem ser exportados como PDF, vídeo (MP4) ou imagens.</p>
                </div>
                <div class="img-container">
                    <img src="https://img.freepik.com/free-vector/presentation-concept-illustration_114360-1695.jpg" alt="PowerPoint" aria-hidden="true">
                </div>
            </div>`,

            // ----- 10: Internet – fundamentos -----
            `<div class="img-text-row left-image">
                <div class="img-container">
                    <img src="https://img.freepik.com/free-vector/internet-communication-concept_114360-1700.jpg" alt="Internet" aria-hidden="true">
                </div>
                <div class="text-container">
                    <h3>10. Internet – Fundamentos e protocolos</h3>
                    <p>A <strong>Internet</strong> é uma rede global de computadores. O acesso ocorre via <strong>navegadores</strong> (browsers): Google Chrome, Microsoft Edge, Mozilla Firefox. O <strong>protocolo HTTP</strong> (Hypertext Transfer Protocol) permite a comunicação entre cliente e servidor web; <strong>HTTPS</strong> é a versão segura, que utiliza criptografia SSL/TLS. <strong>URL</strong> (endereço web) tem formato: protocolo://domínio/caminho. <strong>DNS</strong> (Sistema de Nomes de Domínio) traduz nomes de sites (ex.: www.google.com) para endereços IP numéricos. O <strong>FTP</strong> (File Transfer Protocol) transfere arquivos, não páginas web. <strong>Cookies</strong> são pequenos arquivos de texto salvos pelo navegador, usados para personalização, autenticação e rastreamento. É importante que provas costumam perguntar sobre a diferença entre HTTP e HTTPS, e a função do DNS.</p>
                </div>
            </div>`,

            // ----- 11: E-mail e segurança -----
            `<div class="img-text-row right-image">
                <div class="text-container">
                    <h3>11. Correio eletrônico e segurança digital</h3>
                    <p>O e-mail funciona com protocolos: <strong>SMTP</strong> (envio de mensagens), <strong>POP3</strong> (baixa mensagens do servidor para o dispositivo e as remove do servidor) e <strong>IMAP</strong> (mantém as mensagens no servidor, sincronizando entre dispositivos). Campos de e-mail: <strong>Para</strong>, <strong>Cc</strong> (cópia carbono, destinatários visíveis), <strong>Cco</strong> (cópia oculta, destinatários não visíveis). Segurança: <strong>firewall</strong> controla tráfego de rede, <strong>antivírus</strong> protege contra malwares, <strong>phishing</strong> (e-mails fraudulentos que tentam obter dados), <strong>spam</strong> (mensagens não solicitadas em massa). A criptografia ponta a ponta garante que somente remetente e destinatário leiam a mensagem (WhatsApp, Signal). O Outlook é o cliente de e-mail do pacote Office, integrado ao Exchange para ambientes corporativos.</p>
                </div>
                <div class="img-container">
                    <img src="https://img.freepik.com/free-vector/email-campaign-concept-illustration_114360-1633.jpg" alt="E-mail e segurança" aria-hidden="true">
                </div>
            </div>`,

            // ----- 12: Questões comentadas -----
            `<div class="text-container" style="max-width:100%;">
                <h3>12. Questões comentadas de concursos anteriores</h3>
                <p><strong>Questão 1:</strong> (VUNESP) No Windows 10, o atalho Win + E tem a função de: <strong>a)</strong> Abrir o Windows Explorer. <strong>b)</strong> Abrir o Menu Iniciar. <strong>c)</strong> Bloquear o computador. <strong>d)</strong> Mostrar a área de trabalho. <strong>Gabarito: A.</strong> O Win + E abre o Explorador de Arquivos.</p>
                <p><strong>Questão 2:</strong> (FCC) No Word, a tecla F7 aciona: <strong>a)</strong> Localizar e substituir. <strong>b)</strong> Salvar documento. <strong>c)</strong> Verificação ortográfica e gramatical. <strong>d)</strong> Inserir tabela. <strong>Gabarito: C.</strong> F7 é o atalho para o corretor ortográfico no Word.</p>
                <p><strong>Questão 3:</strong> (CESPE/CEBRASPE) No Excel, a fórmula =MÉDIA(A1:A10) calcula: <strong>a)</strong> A soma dos valores. <strong>b)</strong> A média aritmética dos valores. <strong>c)</strong> O valor máximo. <strong>d)</strong> O valor mínimo. <strong>Gabarito: B.</strong> A função MÉDIA retorna a média aritmética.</p>
                <p><strong>Questão 4:</strong> (IBFC) O protocolo responsável pelo envio de e-mails é o: <strong>a)</strong> POP3. <strong>b)</strong> IMAP. <strong>c)</strong> SMTP. <strong>d)</strong> HTTP. <strong>Gabarito: C.</strong> SMTP serve para envio; POP3 e IMAP para recebimento.</p>
            </div>`,

            // PÁGINA FINAL - CONGRATULAÇÕES
            `<div class="congrats-page">
                <h2>🎉 Parabéns!</h2>
                <p>Você concluiu o estudo das noções básicas de informática com foco em concursos.</p>
                <p>Revisar os atalhos do Windows, as fórmulas essenciais do Excel e os protocolos de internet é o melhor caminho para garantir os pontos certos na sua prova.</p>
                <p>Continue praticando e realizando simulados!</p>
            </div>`
        ];

        const totalPages = pageContents.length;
        let currentPage = 0;
        let fontSizeIndex = 4;
        const fontSizes = [12, 14, 16, 18, 20, 24, 28, 32, 38, 42];

        const pageContentDiv = document.getElementById('pageContent');
        const pageXofY = document.getElementById('pageXofY');
        const progressFill = document.getElementById('progressFill');
        const progressPercent = document.getElementById('progressPercent');
        const fontMinus = document.getElementById('fontMinusBtn');
        const fontPlus = document.getElementById('fontPlusBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const prevBtn = document.getElementById('prevBtnInline');
        const nextBtn = document.getElementById('nextBtnInline');
        const speakBtn = document.getElementById('speakBtn');
        const rateSelect = document.getElementById('rateSelect');

        let synth = window.speechSynthesis;
        let currentUtterance = null;
        let isSpeaking = false;

        function getFemaleVoice() {
            const voices = synth.getVoices();
            const ptVoices = voices.filter(v => v.lang === 'pt-BR');
            const female = ptVoices.find(v => v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('mulher') || v.name.includes('Samantha') || v.name.includes('Maria'));
            return female || ptVoices[0] || voices[0];
        }

        function updateUI() {
            pageContentDiv.innerHTML = pageContents[currentPage];
            const num = currentPage + 1;
            pageXofY.textContent = `Página ${num} de ${totalPages}`;
            const pct = (num / totalPages) * 100;
            progressFill.style.width = pct + '%';
            progressPercent.textContent = Math.round(pct) + '%';
            prevBtn.disabled = (currentPage === 0);
            nextBtn.disabled = (currentPage === totalPages - 1);
            stopReading();
            if (pageContentDiv.scrollTop) pageContentDiv.scrollTop = 0;
        }

        function applyFontSize() {
            const size = fontSizes[fontSizeIndex] + 'px';
            pageContentDiv.style.fontSize = size;
            fontMinus.disabled = (fontSizeIndex === 0);
            fontPlus.disabled = (fontSizeIndex === fontSizes.length-1);
        }

        function changePage(delta) {
            const newPage = currentPage + delta;
            if (newPage >= 0 && newPage < totalPages) {
                currentPage = newPage;
                updateUI();
            }
        }

        function startReading() {
            if (!synth) { alert('Seu navegador não suporta síntese de voz.'); return; }
            if (isSpeaking) { stopReading(); return; }
            const text = pageContentDiv.innerText;
            if (!text.trim()) return;
            currentUtterance = new SpeechSynthesisUtterance(text);
            const voice = getFemaleVoice();
            if (voice) currentUtterance.voice = voice;
            currentUtterance.rate = parseFloat(rateSelect.value);
            currentUtterance.onend = function() {
                isSpeaking = false;
                currentUtterance = null;
                speakBtn.textContent = '🔊';
            };
            synth.speak(currentUtterance);
            isSpeaking = true;
            speakBtn.textContent = '⏹️';
        }

        function stopReading() {
            if (synth && synth.speaking) synth.cancel();
            if (currentUtterance) {
                currentUtterance.onend = null;
                currentUtterance = null;
            }
            isSpeaking = false;
            speakBtn.textContent = '🔊';
        }

        fontMinus.addEventListener('click', () => { if (fontSizeIndex > 0) fontSizeIndex--; applyFontSize(); });
        fontPlus.addEventListener('click', () => { if (fontSizeIndex < fontSizes.length-1) fontSizeIndex++; applyFontSize(); });
        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) document.exitFullscreen();
            else document.documentElement.requestFullscreen();
        });
        prevBtn.addEventListener('click', () => changePage(-1));
        nextBtn.addEventListener('click', () => changePage(1));
        speakBtn.addEventListener('click', startReading);
        rateSelect.addEventListener('change', () => {
            if (isSpeaking && currentUtterance) currentUtterance.rate = parseFloat(rateSelect.value);
        });

        applyFontSize();
        updateUI();
        if (synth) synth.getVoices();
    })();
</script>
</body>
</html>
