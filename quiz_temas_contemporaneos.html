<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quiz · Temas contemporâneos conforme a BNCC · 40 questões</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Verdana', 'Arial', sans-serif;
            background: #f5f7f6;
            color: #1a2e2a;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .quiz-wrapper {
            width: 100%;
            max-width: 85%;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.04);
            padding: 20px 30px;
            border: 1px solid #dde5e0;
        }
        .screen { display: none; }
        .screen.active { display: block; }
        .title {
            font-size: 1.7rem;
            font-weight: 700;
            color: #0f3d2e;
            margin-bottom: 12px;
            text-align: center;
        }
        .sub {
            text-align: center;
            color: #2a5e4a;
            margin-bottom: 20px;
            font-style: italic;
        }
        .question-text { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; line-height: 1.5; }
        .options { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .opt-btn {
            background: #ecf3ef;
            border: 1px solid #b3cdbf;
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 48px;
            cursor: pointer;
            transition: 0.1s;
        }
        .opt-btn.selected { background: #1a5e44; color: white; border-color: #1a5e44; }
        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .feedback.correct { background: #d4edda; border-left: 6px solid #28a745; }
        .feedback.wrong { background: #f8d7da; border-left: 6px solid #dc3545; }
        .toolbar { display: flex; justify-content: space-between; gap: 12px; margin: 20px 0 10px; }
        .tool-btn {
            background: #ecf3ef; border: 1px solid #b3cdbf; padding: 12px; font-size: 1rem;
            border-radius: 48px; flex: 1; text-align: center; cursor: pointer;
        }
        .progress { font-size: 0.85rem; margin-bottom: 8px; color: #1a5e44; text-align: right; }
        .font-controls { display: flex; gap: 8px; margin-bottom: 15px; justify-content: flex-end; }
        .font-btn {
            background: #e6f0ea; border: none; padding: 6px 12px; border-radius: 40px; cursor: pointer; font-weight: bold;
        }
        .result-screen { text-align: center; }
        .result-box { background: #f0f7f3; padding: 20px; border-radius: 28px; margin: 20px 0; }
        .restart-btn {
            background: #1a5e44; color: white; border: none; padding: 14px; border-radius: 60px; width: 100%; cursor: pointer; margin-top: 10px;
        }
        .stats { font-size: 1.1rem; line-height: 1.8; }
        @media (max-width: 640px) { .quiz-wrapper { max-width: 100%; padding: 15px; } .opt-btn { padding: 8px 16px; } }
    </style>
</head>
<body>
<div class="quiz-wrapper">
    <div id="quizScreen" class="screen active">
        <div class="font-controls">
            <button class="font-btn" id="fontMinus">A−</button>
            <button class="font-btn" id="fontPlus">A+</button>
            <button class="font-btn" id="fullscreenBtn">⛶ Tela cheia</button>
        </div>
        <div class="title">📌 Temas contemporâneos conforme a BNCC</div>
        <div class="sub">Economia, tecnologia, meio ambiente, diversidade, direitos humanos e cidadania · 40 questões</div>
        <div class="progress" id="progressText">Questão 1 de 40</div>
        <div id="questionArea">
            <div class="question-text" id="questionText"></div>
            <div class="options" id="optionsArea"></div>
            <div class="feedback" id="feedbackArea" style="display: none;"></div>
        </div>
        <div class="toolbar">
            <button class="tool-btn" id="prevBtn" disabled>◀ Anterior</button>
            <button class="tool-btn" id="nextBtn" disabled>Próxima ▶</button>
        </div>
    </div>

    <div id="resultScreen" class="screen result-screen">
        <h2>📊 Estatística da sua pontuação</h2>
        <div class="result-box" id="resultContent"></div>
        <button class="restart-btn" id="restartQuizBtn">🔄 Refazer quiz</button>
    </div>
</div>

<script>

    const total = questions.length;
    let currentIndex = 0;
    let userAnswers = new Array(total).fill(null);
    let userJustification = new Array(total).fill(null);

    const quizScreen = document.getElementById('quizScreen');
    const resultScreen = document.getElementById('resultScreen');
    const questionText = document.getElementById('questionText');
    const optionsArea = document.getElementById('optionsArea');
    const feedbackArea = document.getElementById('feedbackArea');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const progressText = document.getElementById('progressText');
    const restartQuizBtn = document.getElementById('restartQuizBtn');
    const resultContent = document.getElementById('resultContent');
    const fontMinus = document.getElementById('fontMinus');
    const fontPlus = document.getElementById('fontPlus');
    const fullscreenBtn = document.getElementById('fullscreenBtn');

    let currentFontSize = 16;
    function setFontSize(size) {
        document.querySelector('.quiz-wrapper').style.fontSize = size + 'px';
        const els = document.querySelectorAll('.question-text, .feedback, .opt-btn, .tool-btn, .restart-btn');
        els.forEach(el => el.style.fontSize = size + 'px');
        currentFontSize = size;
    }
    fontMinus.addEventListener('click', () => setFontSize(Math.max(12, currentFontSize-2)));
    fontPlus.addEventListener('click', () => setFontSize(Math.min(36, currentFontSize+2)));
    fullscreenBtn.addEventListener('click', () => { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); });

    function renderQuestion() {
        const q = questions[currentIndex];
        questionText.innerHTML = `${currentIndex+1}. ${q.text}`;
        feedbackArea.style.display = 'none';
        feedbackArea.className = 'feedback';
        optionsArea.innerHTML = '';

        if (q.type === 'tf') {
            const btnTrue = document.createElement('button');
            btnTrue.className = 'opt-btn';
            btnTrue.dataset.value = 'true';
            btnTrue.textContent = '✅ Verdadeiro';
            const btnFalse = document.createElement('button');
            btnFalse.className = 'opt-btn';
            btnFalse.dataset.value = 'false';
            btnFalse.textContent = '❌ Falso';
            optionsArea.appendChild(btnTrue);
            optionsArea.appendChild(btnFalse);
        } else if (q.type === 'mc') {
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.dataset.value = idx.toString();
                btn.textContent = opt;
                optionsArea.appendChild(btn);
            });
        }

        const answer = userAnswers[currentIndex];
        if (answer !== null) {
            const allBtns = optionsArea.querySelectorAll('.opt-btn');
            allBtns.forEach(btn => {
                const btnVal = q.type === 'tf' ? (btn.dataset.value === 'true') : parseInt(btn.dataset.value);
                if (btnVal === answer) btn.classList.add('selected');
            });
            if (userJustification[currentIndex]) {
                const isCorrect = (q.type === 'tf') ? (answer === q.correct) : (answer === q.correct);
                feedbackArea.classList.add(isCorrect ? 'correct' : 'wrong');
                feedbackArea.style.display = 'block';
                feedbackArea.innerHTML = userJustification[currentIndex];
            }
        }

        progressText.innerText = `Questão ${currentIndex+1} de ${total}`;
        prevBtn.disabled = (currentIndex === 0);
        nextBtn.disabled = false;
    }

    function selectAnswer(valueStr) {
        const q = questions[currentIndex];
        let answerValue;
        if (q.type === 'tf') {
            answerValue = (valueStr === 'true');
        } else {
            answerValue = parseInt(valueStr);
        }
        userAnswers[currentIndex] = answerValue;

        const isCorrect = (q.type === 'tf') ? (answerValue === q.correct) : (answerValue === q.correct);
        const correctText = q.type === 'tf' ? (q.correct ? 'Verdadeiro' : 'Falso') : q.options[q.correct];
        const explanation = `<strong>${isCorrect ? '✓ Correto!' : '✗ Incorreto'}</strong><br>Justificativa: ${q.justification}<br><span style="font-size:0.9rem;">Resposta correta: ${correctText}.</span>`;
        userJustification[currentIndex] = explanation;
        feedbackArea.classList.remove('correct', 'wrong');
        feedbackArea.classList.add(isCorrect ? 'correct' : 'wrong');
        feedbackArea.style.display = 'block';
        feedbackArea.innerHTML = explanation;

        const allBtns = optionsArea.querySelectorAll('.opt-btn');
        allBtns.forEach(btn => {
            btn.classList.remove('selected');
            const btnVal = q.type === 'tf' ? (btn.dataset.value === 'true') : parseInt(btn.dataset.value);
            if (btnVal === answerValue) btn.classList.add('selected');
        });
    }

    optionsArea.addEventListener('click', (e) => {
        const btn = e.target.closest('.opt-btn');
        if (btn) selectAnswer(btn.dataset.value);
    });

    prevBtn.addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; renderQuestion(); } });
    nextBtn.addEventListener('click', () => {
        if (userAnswers[currentIndex] === null) {
            alert('Por favor, responda a questão antes de avançar.');
            return;
        }
        if (currentIndex < total-1) { currentIndex++; renderQuestion(); }
        else mostrarResultado();
    });

    function mostrarResultado() {
        let acertos = 0;
        let erros = 0;
        for (let i = 0; i < total; i++) {
            const ans = userAnswers[i];
            const q = questions[i];
            if (ans !== null) {
                if ((q.type === 'tf' && ans === q.correct) || (q.type === 'mc' && ans === q.correct)) acertos++;
                else erros++;
            }
        }
        const percentual = (acertos / total) * 100;
        const nota = (acertos / total) * 10;
        let mensagem = '';
        if (percentual >= 85) mensagem = '⭐ Excelente! Você está por dentro dos temas contemporâneos mais relevantes.';
        else if (percentual >= 70) mensagem = '👍 Muito bom! Aprofunde-se na obra de Milton Santos sobre globalização e na Agenda 2030.';
        else if (percentual >= 50) mensagem = '📘 Bom, mas vale reler as competências da BNCC e os textos sobre direitos humanos.';
        else mensagem = '📚 Sugiro revisar os temas transversais da BNCC e os capítulos sobre economia digital e ambiental.';

        resultContent.innerHTML = `
            <div class="stats">
                <p><strong>✅ Acertos:</strong> ${acertos} (${percentual.toFixed(1)}%)</p>
                <p><strong>❌ Erros:</strong> ${erros}</p>
                <p><strong>🎓 Nota (0 a 10):</strong> ${nota.toFixed(1)}</p>
                <p><strong>📊 Percentual de acerto:</strong> ${percentual.toFixed(1)}%</p>
                <hr style="margin: 15px 0;">
                <p>${mensagem}</p>
            </div>
        `;
        quizScreen.classList.remove('active');
        resultScreen.classList.add('active');
    }

    restartQuizBtn.addEventListener('click', () => {
        userAnswers = new Array(total).fill(null);
        userJustification = new Array(total).fill(null);
        currentIndex = 0;
        resultScreen.classList.remove('active');
        quizScreen.classList.add('active');
        renderQuestion();
    });

    renderQuestion();
    setFontSize(16);
</script>
</body>
</html>
