    const questions = [
        {

        },
        {

            text: "Nos termos do Decreto nº 68.155/2023, qual órgão é responsável pelo monitoramento da implementação da LAI no âmbito do Estado de São Paulo?",
            correct: 1,
            options: [
                "Secretaria da Fazenda e Planejamento",
                "Controladoria Geral do Estado (CGE)",

                "Procuradoria Geral do Estado (PGE)"

        },
        {

        },
        {

                "Ao Ouvidor Geral do Estado",
                "Ao Chefe do SIC do órgão",
                "À Controladoria Geral do Estado",
                "À autoridade hierarquicamente superior à que proferiu a decisão"
            ],
            justification: "O Decreto, alinhado ao art. 15 da LAI, estabelece que o recurso de primeira instância se dirige à autoridade hierarquicamente superior àquela que negou a informação."
        },
        {
            type: 'tf',
            text: "O Decreto prevê que, esgotadas as instâncias recursais administrativas, o requerente pode apresentar recurso à Comissão Estadual de Acesso à Informação (CEAI).",

            justification: "O Decreto institui a CEAI como instância recursal final dentro do âmbito administrativo estadual, conforme arts. 33 a 36."
        },
        {
            type: 'mc',
            text: "A Comissão Estadual de Acesso à Informação (CEAI), criada pelo Decreto, tem sua composição definida como:",
            correct: 2,
            options: [
                "Exclusivamente por membros da sociedade civil",
                "Apenas por servidores da Controladoria Geral do Estado",
                "Órgão colegiado composto por representantes de diferentes Secretarias de Estado e da sociedade civil",
                "Comissão unicamente formada por Desembargadores do Tribunal de Justiça"
            ],
            justification: "O Decreto estabelece uma composição mista, com membros do poder público e representantes da sociedade civil organizada (arts. 33-35)."
        },
        {
            type: 'tf',
            text: "No âmbito do Decreto, a autoridade máxima do órgão ou entidade pode delegar a competência de classificação de informação no grau ultrassecreto.",
            correct: true,
            justification: "Seguindo a lógica da LAI (art. 27, §1º), o Decreto permite a delegação para classificação de informações, embora a subdelegação seja vedada."
        },
        {
            type: 'mc',
            text: "De acordo com o Decreto, qual o prazo para resposta ao pedido de acesso à informação, nos mesmos moldes da Lei Federal?",

                "10 (dez) dias",
                "5 (cinco) dias",
                "20 (vinte) dias, prorrogáveis por mais 10 (dez) dias",
                "30 (dias), prorrogáveis por mais 20 (vinte) dias"
            ],
            justification: "O prazo de 20 dias prorrogáveis por mais 10 dias, estabelecido pelo art. 11 da LAI, é replicado no Decreto."
        },
        {
            type: 'tf',
            text: "O Decreto nº 68.155/2023 veda expressamente a exigência de justificativa para o pedido de acesso à informação, conforme o princípio de que a informação pública pertence ao cidadão e não ao Estado.",
            correct: true,
            justification: "Em consonância com o art. 10, §3º, da LAI, o Decreto proíbe que se exija do requerente os motivos determinantes da sua solicitação."
        },
        {
            type: 'mc',
            text: "De acordo com o Decreto, as informações pessoais relativas à vida privada e à intimidade terão restrição de acesso pelo prazo máximo de:",

            options: [
                "50 (cinquenta) anos",
                "100 (cem) anos",
                "Permanente, sem possibilidade de acesso",
                "25 (vinte e cinco) anos"
            ],
            justification: "Seguindo o art. 31 da LAI, o Decreto mantém o prazo máximo de restrição de 100 anos para as informações pessoais."
        },
        {
            type: 'tf',
            text: "A divulgação de informações sobre licitações e contratos administrativos no Portal da Transparência do Estado de São Paulo é exemplo de transparência ativa, conforme determina o Decreto.",
            correct: true,
            justification: "O Decreto, em seu art. 5º e seguintes, detalha as obrigações de transparência ativa, que incluem a divulgação de contratos, licitações, repasses e convênios nos portais oficiais."
        },
        {
            type: 'mc',
            text: "O Decreto estabelece que o Serviço de Informações ao Cidadão (SIC) no Estado de São Paulo deve funcionar:",
            correct: 0,
            options: [
                "Em unidades físicas e também por meio eletrônico, preferencialmente via internet",
                "Exclusivamente por telefone",
                "Apenas mediante agendamento presencial",
                "Somente em formato físico e por correspondência"
            ],
            justification: "O Decreto determina a instituição de SICs físicos em cada órgão ou entidade, com atendimento presencial, além do sistema eletrônico unificado para pedidos de informação."
        },
        {
            type: 'tf',
            text: "O pedido de acesso à informação formulado com base no Decreto pode ser negado se a informação requerida for genérica, desproporcional ou desarrazoada, ou exigir trabalhos adicionais de consolidação de dados não disponíveis.",
            correct: false,
            justification: "De acordo com o art. 13 da LAI e o entendimento adotado pelo Decreto, pedidos genéricos podem ser rejeitados, assim como os que exijam trabalhos adicionais de análise ou consolidação que não estejam prontamente disponíveis."
        },
        {
            type: 'mc',
            text: "No contexto do Decreto estadual, a autoridade de monitoramento da LAI é exercida pela CGE. Qual das alternativas NÃO é uma de suas atribuições?",

                "Orientar as unidades sobre o cumprimento da LAI",
                "Consolidar e divulgar estatísticas anuais dos pedidos de acesso à informação",

                "Decidir de forma terminativa sobre a concessão de habite-se em obras públicas"

            justification: "As atribuições da CGE elencadas no Decreto incluem orientação, monitoramento e consolidação estatística, jamais alcançando funções de aprovação de projetos de construção civil como a concessão de habite-se."
        },
        {
            type: 'tf',
            text: "O Decreto nº 68.155/2023 estabelece que, em caso de extravio ou destruição de informação pública, o órgão deverá instaurar sindicância para apurar responsabilidade, além de comunicar o fato ao requerente.",
            correct: true,
            justification: "Em consonância com os princípios da LAI, o Decreto determina que a destruição não autorizada de documentos ou informações públicas deve ser objeto de apuração imediata."
        },
        {
            type: 'mc',
            text: "A negativa de acesso à informação deve ser comunicada ao requerente com:",

                "A fundamentação legal, as razões da negativa e as informações sobre possibilidade de recurso",
                "Um formulário para ser preenchido e entregue pessoalmente"
            ],
            justification: "O art. 14 da LAI e o Decreto determinam que a negativa deve conter fundamentação legal e fática, além de informar sobre prazos e órgãos para interposição de recurso."
        },
        {
            type: 'tf',
            text: "As audiências públicas para discussão de políticas de transparência são obrigatórias, segundo o Decreto, em todos os órgãos estaduais de forma semestral.",
            correct: false,
            justification: "O Decreto incentiva a participação social, mas não impõe uma obrigação semestral de audiências públicas em todos os órgãos. Ele prevê mecanismos de consulta pública quando pertinente."
        },
        {
            type: 'mc',
            text: "O Decreto determina que cada órgão ou entidade designe um responsável pela implementação da LAI, conhecido como:",
            correct: 1,
            options: [
                "Ouvidor Setorial",
                "Autoridade de Monitoramento da LAI no órgão",
                "Delegado de Polícia",
                "Chefe de Gabinete"
            ],
            justification: "Cada órgão e entidade deve designar um servidor ou unidade responsável por coordenar o atendimento, a tramitação e o monitoramento dos pedidos de acesso à informação (Autoridade de Monitoramento local)."
        },
        {
            type: 'tf',
            text: "A CEAI julga os recursos contra negativa de acesso à informação no âmbito estadual e suas decisões podem ser questionadas diretamente na via judicial, sem necessidade de trânsito em julgado administrativo.",
            correct: false,
            justification: "A decisão da CEAI é a última instância administrativa. O acesso ao Judiciário é possível, mas a decisão da CEAI encerra a via administrativa. Não é necessário 'questionar diretamente na via judicial' como substituto ao recurso administrativo; o caminho judicial é paralelo e pode ser acionado a qualquer tempo, independentemente do esgotamento da via administrativa."
        },
        {
            type: 'mc',
            text: "O Decreto define que a publicação de dados abertos pelos órgãos estaduais deve seguir o princípio de:",
            correct: 3,
            options: [
                "Restrição máxima com sigilo automático",
                "Formato exclusivamente PDF",
                "Publicação apenas mediante solicitação",
                "Dados abertos, legíveis por máquina e em formatos reutilizáveis"
            ],
            justification: "Em conformidade com as diretrizes nacionais, o Decreto orienta a transparência ativa por meio de formatos abertos, que permitam o processamento automatizado e a reutilização dos dados."
        },
        {
            type: 'tf',
            text: "A classificação de informação no grau secreto, no âmbito do Poder Executivo do Estado de São Paulo, compete exclusivamente ao Chefe do Poder Executivo (Governador).",
            correct: false,
            justification: "De acordo com o art. 27 da LAI, a competência para classificar como secreto alcança também autoridades como Secretários de Estado, Chefes de Missões Diplomáticas e Comandantes das Forças Armadas, conforme aplicável à esfera estadual e reproduzido pelo Decreto."
        },
        {
            type: 'mc',
            text: "Em relação à proteção de dados pessoais, o Decreto nº 68.155/2023 estabelece que:",
            correct: 2,
            options: [
                "Todo dado pessoal deve ser público",
                "A LAI não se aplica a dados pessoais em hipótese alguma",
                "O tratamento de dados pessoais deve respeitar a Lei Geral de Proteção de Dados (LGPD), preservando a intimidade e a privacidade",
                "Os dados pessoais podem ser divulgados sem restrição após 5 anos"
            ],
            justification: "O Decreto reconhece a interface entre a LAI e a LGPD, determinando que os dados pessoais contidos em documentos públicos só podem ser acessados conforme as hipóteses legais e com respeito à privacidade."
        },
        {
            type: 'tf',
            text: "O Decreto permite que a Controladoria Geral do Estado (CGE) recomende a abertura de sindicância ou processo administrativo disciplinar contra agentes públicos que descumprirem a LAI.",

            justification: "Entre as atribuições da CGE está recomendar medidas corretivas e a apuração de responsabilidades por descumprimentos, podendo sugerir a instauração de sindicâncias."

                "O registro e acompanhamento do pedido, a resposta eletrônica e a interposição de recursos",

                "Exclusivamente pedidos feitos por escrito em papel timbrado",
                "A divulgação automática de todos os pedidos e dados pessoais dos requerentes"

            justification: "O Decreto prevê um sistema informatizado único que permita ao cidadão protocolar, acompanhar e recorrer dos seus pedidos pela internet."

        {
            type: 'tf',
            text: "O Decreto nº 68.155/2023 revogou expressamente o Decreto estadual nº 58.052/2012, que anteriormente regulamentava a LAI em São Paulo.",

        },
        {
            type: 'tf',
            text: "O rol de informações desclassificadas e classificadas deve ser publicado anualmente pela autoridade máxima de cada órgão, conforme determina expressamente o Decreto, em cumprimento ao art. 30 da LAI.",

            justification: "O art. 30 da LAI é de observância obrigatória e replicado no Decreto, determinando a publicação anual do rol de documentos desclassificados e do rol de documentos classificados."

        {
            type: 'mc',

        {

            justification: "O Decreto não pode inovar e reduzir prazos de sigilo estabelecidos pela Lei Federal (art. 24), que fixa o prazo de 25 anos para informações ultrassecretas. A regra federal prevalece sobre o decreto estadual."

        {
            type: 'mc',
            text: "A Comissão Estadual de Acesso à Informação (CEAI), entre suas atribuições no Decreto, deve:",
            correct: 3,
            options: [
                "Executar diretamente obras públicas",
                "Substituir o Governador em suas ausências",
                "Definir a política monetária estadual",
                "Decidir os recursos contra decisões denegatórias de acesso proferidas pela CGE ou autoridade hierarquicamente superior"
            ],
            justification: "A CEAI é o órgão colegiado de última instância administrativa para julgar os recursos contra negativas de acesso à informação, conforme arts. 33 e seguintes."
        }
    ];

    const total = questions.length;
    let currentIndex = 0;
    let userAnswers = new Array(total).fill(null);
    let userJustification = new Array(total).fill(null);

    const quizScreen = document.getElementById('quizScreen');
    const resultScreen = document.getElementById('resultScreen');
    const questionText = document.getElementById('questionText');
    const optionsArea = document.getElementById('optionsArea');
    const feedbackArea = document.getElementById('feedbackArea');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const progressText = document.getElementById('progressText');
    const restartQuizBtn = document.getElementById('restartQuizBtn');
    const resultContent = document.getElementById('resultContent');
    const fontMinus = document.getElementById('fontMinus');
    const fontPlus = document.getElementById('fontPlus');
    const fullscreenBtn = document.getElementById('fullscreenBtn');

    let currentFontSize = 16;
    function setFontSize(size) {
        document.querySelector('.quiz-wrapper').style.fontSize = size + 'px';
        const els = document.querySelectorAll('.question-text, .feedback, .opt-btn, .tool-btn, .restart-btn');
        els.forEach(el => el.style.fontSize = size + 'px');
        currentFontSize = size;
    }
    fontMinus.addEventListener('click', () => setFontSize(Math.max(12, currentFontSize-2)));
    fontPlus.addEventListener('click', () => setFontSize(Math.min(36, currentFontSize+2)));
    fullscreenBtn.addEventListener('click', () => { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); });

    function renderQuestion() {
        const q = questions[currentIndex];
        questionText.innerHTML = `${currentIndex+1}. ${q.text}`;
        feedbackArea.style.display = 'none';
        feedbackArea.className = 'feedback';
        optionsArea.innerHTML = '';

        if (q.type === 'tf') {
            const btnTrue = document.createElement('button');
            btnTrue.className = 'opt-btn';
            btnTrue.dataset.value = 'true';
            btnTrue.textContent = '✅ Verdadeiro';
            const btnFalse = document.createElement('button');
            btnFalse.className = 'opt-btn';
            btnFalse.dataset.value = 'false';
            btnFalse.textContent = '❌ Falso';
            optionsArea.appendChild(btnTrue);
            optionsArea.appendChild(btnFalse);
        } else if (q.type === 'mc') {
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.dataset.value = idx.toString();
                btn.textContent = opt;
                optionsArea.appendChild(btn);
            });
        }

        const answer = userAnswers[currentIndex];
        if (answer !== null) {
            const allBtns = optionsArea.querySelectorAll('.opt-btn');
            allBtns.forEach(btn => {
                const btnVal = q.type === 'tf' ? (btn.dataset.value === 'true') : parseInt(btn.dataset.value);
                if (btnVal === answer) btn.classList.add('selected');
            });
            if (userJustification[currentIndex]) {
                const isCorrect = (q.type === 'tf') ? (answer === q.correct) : (answer === q.correct);
                feedbackArea.classList.add(isCorrect ? 'correct' : 'wrong');
                feedbackArea.style.display = 'block';
                feedbackArea.innerHTML = userJustification[currentIndex];
            }
        }

        progressText.innerText = `Questão ${currentIndex+1} de ${total}`;
        prevBtn.disabled = (currentIndex === 0);
        nextBtn.disabled = false;
    }

    function selectAnswer(valueStr) {
        const q = questions[currentIndex];
        let answerValue;
        if (q.type === 'tf') {
            answerValue = (valueStr === 'true');
        } else {
            answerValue = parseInt(valueStr);
        }
        userAnswers[currentIndex] = answerValue;

        const isCorrect = (q.type === 'tf') ? (answerValue === q.correct) : (answerValue === q.correct);
        const correctText = q.type === 'tf' ? (q.correct ? 'Verdadeiro' : 'Falso') : q.options[q.correct];
        const explanation = `<strong>${isCorrect ? '✓ Correto!' : '✗ Incorreto'}</strong><br>Justificativa: ${q.justification}<br><span style="font-size:0.9rem;">Resposta correta: ${correctText}.</span>`;
        userJustification[currentIndex] = explanation;
        feedbackArea.classList.remove('correct', 'wrong');
        feedbackArea.classList.add(isCorrect ? 'correct' : 'wrong');
        feedbackArea.style.display = 'block';
        feedbackArea.innerHTML = explanation;

        const allBtns = optionsArea.querySelectorAll('.opt-btn');
        allBtns.forEach(btn => {
            btn.classList.remove('selected');
            const btnVal = q.type === 'tf' ? (btn.dataset.value === 'true') : parseInt(btn.dataset.value);
            if (btnVal === answerValue) btn.classList.add('selected');
        });
    }

    optionsArea.addEventListener('click', (e) => {
        const btn = e.target.closest('.opt-btn');
        if (btn) selectAnswer(btn.dataset.value);
    });

    prevBtn.addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; renderQuestion(); } });
    nextBtn.addEventListener('click', () => {
        if (userAnswers[currentIndex] === null) {
            alert('Por favor, responda a questão antes de avançar.');
            return;
        }
        if (currentIndex < total-1) { currentIndex++; renderQuestion(); }
        else mostrarResultado();
    });

    function mostrarResultado() {
        let acertos = 0;
        let erros = 0;
        for (let i = 0; i < total; i++) {
            const ans = userAnswers[i];
            const q = questions[i];
            if (ans !== null) {
                if ((q.type === 'tf' && ans === q.correct) || (q.type === 'mc' && ans === q.correct)) acertos++;
                else erros++;
            }
        }
        const percentual = (acertos / total) * 100;
        const nota = (acertos / total) * 10;
        let mensagem = '';
        if (percentual >= 85) mensagem = '⭐ Excelente! Você domina a regulamentação da LAI no Estado de São Paulo.';
        else if (percentual >= 70) mensagem = '👍 Muito bom! Reforce a composição da CEAI e as atribuições da CGE.';
        else if (percentual >= 50) mensagem = '📘 Bom, mas vale rever o Decreto 68.155/2023, especialmente os artigos sobre a CEAI e os SICs.';
        else mensagem = '📚 Recomendo a leitura integral do Decreto 68.155/2023 e da LAI (Lei 12.527/2011).';

        resultContent.innerHTML = `
            <div class="stats">
                <p><strong>✅ Acertos:</strong> ${acertos} (${percentual.toFixed(1)}%)</p>
                <p><strong>❌ Erros:</strong> ${erros}</p>
                <p><strong>🎓 Nota (0 a 10):</strong> ${nota.toFixed(1)}</p>
                <p><strong>📊 Percentual de acerto:</strong> ${percentual.toFixed(1)}%</p>
                <hr style="margin: 15px 0;">
                <p>${mensagem}</p>
            </div>
        `;
        quizScreen.classList.remove('active');
        resultScreen.classList.add('active');
    }

    restartQuizBtn.addEventListener('click', () => {
        userAnswers = new Array(total).fill(null);
        userJustification = new Array(total).fill(null);
        currentIndex = 0;
        resultScreen.classList.remove('active');
        quizScreen.classList.add('active');
        renderQuestion();
    });

    renderQuestion();
    setFontSize(16);
</script>
</body>
</html>
